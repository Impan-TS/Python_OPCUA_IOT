<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar with Dropdown Arrow Icons</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        .sidebar {
            position: fixed;
            width: 150px;
            height: 90%;
            top: 45px;
            left: -2px;
            background-color: #00508a;
            padding-top: 20px;
            color: white;
        }

        .module-button {
            display: flex;
            align-items: center;
            width: 100%;
            background-color: #00508a;
            color: white;
            padding-left: 15px;
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            border: none;
            outline: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            border-bottom: 0.2px solid black;
            position: relative;
            font-style: Roboto Mono;
        }

        .module-button:hover {
            background-color: #005fa3;
        }

        .submodule-container {
            display: none;
            background-color: #00508a;
        }

        .submodule-button {
            width: 100%;
            background-color: #00508a;
            color: white;
            padding-left: 32px;
            padding-bottom: 10px;
            padding-top: 10px;
            font-weight: 600;
            border: none;
            outline: none;
            font-size: 12px;
            margin-bottom: 0px;
            text-align: left;
            cursor: pointer;
        }

        .submodule-button:hover {
            background-color: #005fa3;
        }

        .content {
            margin-left: 160px;
            /* Adjust this according to sidebar width */
            padding: 20px;
        }

        .fa-house,
        .fa-building,
        .fa-triangle-exclamation,
        .fa-gear,
        .fa-file {
            font-size: 11px;
            padding-right: 7px;
        }

        .submodule-container {
            display: none;
        }

        .active {
            font-weight: bold;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="sidebar">
        <button id="home" class="module-button" onclick="toggleSubmodules('homeSubmodules', this)"><i
                class="fa-solid fa-house"></i> Home</button>
        <div id="homeSubmodules" class="submodule-container"></div>

        <button id="departments" class="module-button" onclick="toggleSubmodules('departmentsSubmodules', this)"><i
                class="fa-solid fa-building"></i> Departments</button>
        <div id="departmentsSubmodules" class="submodule-container"></div>

        <button id="alarms" class="module-button" onclick="toggleSubmodules('alarmsSubmodules', this)"><i
                class="fa-solid fa-triangle-exclamation"></i> Alarms</button>
        <div id="alarmsSubmodules" class="submodule-container"></div>

        <button id="settings" class="module-button" onclick="toggleSubmodules('settingsSubmodules', this)"><i
                class="fa-solid fa-gear"></i> Settings</button>
        <div id="settingsSubmodules" class="submodule-container"></div>

        <button id="reports" class="module-button" onclick="toggleSubmodules('reportsSubmodules', this)"><i
                class="fa-solid fa-file"></i> Analytics</button>
        <div id="reportsSubmodules" class="submodule-container"></div>
    </div>

    <script>
        function toggleSubmodules(submoduleId, buttonElement) {
            var dropdowns = document.querySelectorAll('.submodule-container');

            dropdowns.forEach(function (dropdown) {
                if (dropdown.id !== submoduleId) {
                    dropdown.style.display = 'none';
                    var btn = dropdown.previousElementSibling;
                    if (btn) {
                        btn.classList.remove('active');
                    }
                }
            });

            var submoduleContainer = document.getElementById(submoduleId);
            if (submoduleContainer.style.display === 'block') {
                submoduleContainer.style.display = 'none';
                buttonElement.classList.remove('active');
            } else {
                submoduleContainer.style.display = 'block';
                buttonElement.classList.add('active');
            }

            if (!submoduleContainer.hasChildNodes()) {
                var submodules;
                switch (submoduleId) {
                    case 'departmentsSubmodules':
                        submodules = ['Cards', 'Knitting', 'Preparatory', 'Spinning 1', 'Spinning 2', 'Winding', 'Spinning 1 Unit-2', 'Spinning 2 Unit-2', 'Winding Unit-2'];
                        break;
                    case 'alarmsSubmodules':
                        submodules = ['High Temperature', 'Low Pressure', 'System Error'];
                        break;
                    case 'settingsSubmodules':
                        submodules = ['Set Point', 'Digital Input', 'Digital Output', 'Analog Input', 'Analog Output', 'Preset Values', 'Timer', 'Controllers', 'UPSS', 'Pump Min Set'];
                        break;
                    case 'reportsSubmodules':
                        submodules = ['Trends', 'Report'];
                        break;
                    default:
                        submodules = [];
                }

                submodules.forEach(function (submoduleName) {
                    var btn = document.createElement('button');
                    btn.className = 'submodule-button';
                    btn.innerHTML = submoduleName;
                    btn.onclick = function () {
                        if (submoduleName === 'Spinning 2') {
                            window.location.href = '/spinning2'; // Redirect to /spinning2
                        } else {
                            alert('Clicked on: ' + submoduleName);
                        }
                    };


                    submoduleContainer.appendChild(btn);
                });
            }
        }
    </script>

    <div id="moduleContent"></div> <!-- Container for loading spinning2 content -->


    <div class="title-bar">
        <div class="left-section">
            <img src="http://localhost:1880/LOGO.png" alt="Company Logo" class="company-logo">
        </div>
        <div class="company-name"
            style="position: absolute; top: 11px; font-size:30px; font-weight: bold; left: 520px;">
            <span>TSE Control System</span>
        </div>
        <div class="right-section">
            <span id="time"></span><br>
            <span id="date"></span>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('time').textContent = `Time : ${timeString}`;
            document.getElementById('date').textContent = `Date : ${day}/${month}/${year}`;
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>

    <div>
        <iframe id="reportIframe" src="http://127.0.0.1:5000"
            style="position: fixed; top: 65px; left: 145px; width: 89%; height: 90%; border: none; display: none;"></iframe>
    </div>

    <div id="custominputdiv" style="display: none;">
        <h2 style="position:absolute; top:180px; left:300px;">Spinning 2 :</h2>
        <input id="customValueInput" type="number" value="{{msg.payload}}"
            style="position:absolute; top:190px; left:450px; width: 100px; height: 30px; background-color: white; color: black; border: 2px solid black; text-align: center; border-radius: 5px;" />
        <button id="updateValueButton"
            style="position:absolute; top:194px; left:570px; width: 50px; height: 25px; background-color: red; font-size: 12px; color: white; border: none; border-radius: 5px; cursor: pointer;"><b>Update</b></button>
    </div>

    <script>
        (function (scope) {
            document.getElementById('updateValueButton').addEventListener('click', function () {
                var value = document.getElementById('customValueInput').value;
                if (value !== '') {
                    scope.send({ payload: parseFloat(value), topic: "ns=3;i=1008;datatype=Double" });
                }
            });
        })(scope);
    </script>

    <style>
        .title-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #00508a;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid black;
        }

        .company-logo {
            margin-top: 8px;
            height: 40px;
            width: 40px;
            margin-left: 28px;
            background-color: white;
            border-radius: 50px;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
        }

        .right-section {
            font-size: 16px;
            padding-left: 1050px;
        }

        .left-section {
            display: flex;
            border-right: 0.5px solid black;
            top: 0px;
            padding-right: 60px;
            width: fit-content;
            height: 60px;
        }
    </style>
</body>

</html>
